name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git zip unzip \
            autoconf automake libtool pkg-config zlib1g-dev libncurses-dev \
            libffi-dev libssl-dev cmake
      - name: Install buildozer
        run: pip install --user buildozer "cython<3.0"
      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chand-electronics-apk
          path: bin/*.apk
